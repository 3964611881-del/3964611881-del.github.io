
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小K的自我介绍</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        body {
            min-height: 100vh;
            /* 你的专属背景图 */
            background-image: url("https://p3-flow-image-sign.douyinpic.com/ocean-cloud-tos/9a420013809a4048990411400d344311~tplv-a9rns2rl98-image.image");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            padding: 40px 20px;
        }

        .card {
            max-width: 700px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.74);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: 28px;
            padding: 50px 35px;
            box-shadow: 0 8px 36px rgba(0, 0, 0, 0.12);
        }

        .avatar {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            margin: 0 auto 25px;
            border: 4px solid #fff;
            box-shadow: 0 4px 18px rgba(255, 170, 200, 0.45);
        }

        .title {
            text-align: center;
            font-size: 32px;
            color: #2d2d44;
            margin-bottom: 40px;
            letter-spacing: 2px;
        }

        .info-item {
            padding: 16px 20px;
            margin: 14px 0;
            background: rgba(255, 255, 255, 0.65);
            border-radius: 16px;
            transition: 0.3s ease;
        }

        .info-item:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.9);
        }

        .info-item p {
            font-size: 16px;
            color: #444;
            line-height: 1.8;
        }

        .info-item strong {
            color: #b86b98;
            font-size: 17px;
            margin-right: 8px;
        }

        .record {
            margin-top: 30px;
            padding: 18px;
            background: rgba(248, 232, 240, 0.7);
            border-radius: 16px;
            text-align: center;
            color: #666;
            font-size: 14px;
        }

        .footer {
            margin-top: 45px;
            padding-top: 20px;
            border-top: 1px solid rgba(0,0,0,0.08);
            text-align: center;
            font-size: 13px;
            color: #888;
            line-height: 1.8;
        }
    </style>
</head>
<body>
    <div class="card">
        <img class="avatar" src="https://p3-flow-image-sign.douyinpic.com/ocean-cloud-tos/9a420013809a4048990411400d344311~tplv-a9rns2rl98-image.image" alt="头像">

        <h1 class="title">自我介绍</h1>

        <div class="info-item">
            <p><strong>名字：</strong>小K</p>
        </div>
        <div class="info-item">
            <p><strong>性别：</strong>男</p>
        </div>
        <div class="info-item">
            <p><strong>年龄：</strong>16岁</p>
        </div>
        <div class="info-item">
            <p><strong>爱好：</strong>晨曦宝宝</p>
        </div>
        <div class="info-item">
            <p><strong>性格：</strong>内向，不知道说什么</p>
        </div>

        <div class="record">
            📝 记录：现在是5月14日凌晨3:25分
        </div>

        <div class="footer">
            制作：代码：AI提供<br>
            服务器：Vercel<br>
            域名：vercel<br>
            网页文件：Github→index.html
        </div>
    </div>
</body>
</html>
