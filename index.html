<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xiaok的博客</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        body {
            min-height: 100vh;
            /* 你的专属背景图 */
            background-image: url("https://p3-flow-image-sign.douyinpic.com/ocean-cloud-tos/9a420013809a4048990411400d344311~tplv-a9rns2rl98-image.image");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            padding: 40px 20px;
        }

        /* 毛玻璃主卡片 */
        .blog-card {
            max-width: 720px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: 26px;
            padding: 45px 35px;
            box-shadow: 0 8px 36px rgba(0, 0, 0, 0.12);
        }

        /* 顶部圆形头像 */
        .avatar {
            width: 135px;
            height: 135px;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            margin: 0 auto 22px;
            border: 4px solid #ffffff;
            box-shadow: 0 4px 18px rgba(255, 170, 200, 0.45);
        }

        .title {
            text-align: center;
            font-size: 30px;
            color: #2d2d44;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #666677;
            margin-bottom: 40px;
            font-size: 15px;
        }

        /* 文章模块 */
        .article {
            background: rgba(255, 255, 255, 0.65);
            border-radius: 18px;
            padding: 24px;
            margin-bottom: 22px;
            transition: all 0.3s ease;
        }

        .article:hover {
            transform: translateY(-4px);
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        .article h3 {
            color: #424266;
            margin-bottom: 10px;
            font-size: 19px;
        }

        .article p {
            color: #555566;
            line-height: 1.75;
            font-size: 14.5px;
        }

        .footer {
            text-align: center;
            margin-top: 48px;
            color: #888;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="blog-card">
        <!-- 顶部圆形头像 -->
        <img class="avatar" src="https://p3-flow-image-sign.douyinpic.com/ocean-cloud-tos/9a420013809a4048990411400d344311~tplv-a9rns2rl98-image.image" alt="头像">

        <h1 class="title">我的个人小博客</h1>
        <div class="subtitle">温柔记录 · 日常随笔 · 不知道写啥</div>

        <div class="article">
            <h3>✨ 博客正式上线啦</h3>
            <p>用 GitHub + Vercel 搭建了免费个人博客，不用服务器、不用花钱。</p>
        </div>

        <div class="article">
            <h3>📝 关于这里</h3>
            <p>测试测试测试测试测试xiaok。</p>
        </div>

        <div class="article">
            <h3>💡 小期待</h3>
            <p>未来可能会在这里分享更多内容。</p>
        </div>

        <div class="footer">
            Powered by GitHub & Vercel
        </div>
    </div>
</body>
</html>
